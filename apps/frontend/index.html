<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAHNERFLOW - 电化学流程编辑器</title>
    <meta name="description" content="基于FlowGram.AI的现代化电化学流程编辑器，采用iOS 26设计风格">
    
    <!-- iOS 26 风格图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

    <!-- 预加载关键样式 -->
    <style>
        /* 防止页面闪烁 */
        :root {
            --font-latin: "Oxanium", sans-serif;
            --font-number: "Oxanium", sans-serif;
            --font-cjk: "Noto Sans SC Variable", "Microsoft YaHei UI", sans-serif;
            --font-ui: "Oxanium", "Noto Sans SC Variable", "Microsoft YaHei UI", sans-serif;
            --font-ui-tracking: 0.018em;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-ui);
            letter-spacing: var(--font-ui-tracking);
            background: #f8f9fa;
            overflow: hidden;
        }
        
        /* 加载动画 */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        
        .loading-content {
            text-align: center;
            color: white;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .loading-text--brand {
            display: inline-block;
            font-family: var(--font-number);
            font-weight: 720;
            transform: scaleY(0.93);
            transform-origin: center;
        }
        
        .loading-subtext {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- 加载屏幕 -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <div class="loading-text loading-text--brand">ZAHNERFLOW</div>
            <div class="loading-subtext">正在初始化电化学流程编辑器...</div>
        </div>
    </div>

    <!-- React 应用根节点 -->
    <div id="root"></div>

    <!-- 应用脚本 -->
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- 移除加载屏幕的脚本 -->
    <script>
        // 等待应用加载完成后移除加载屏幕
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                    }, 500);
                }
            }, 1000);
        });
        
        // 错误处理
        window.addEventListener('error', (event) => {
            console.error('应用错误:', event.error);
            const loadingScreen = document.getElementById('loadingScreen');
            if (loadingScreen) {
                loadingScreen.innerHTML = `
                    <div class="loading-content">
                        <div style="font-size: 48px; margin-bottom: 20px;">❌</div>
                        <div class="loading-text">应用加载失败</div>
                        <div class="loading-subtext">请检查控制台获取详细信息</div>
                        <button onclick="location.reload()" style="
                            margin-top: 20px;
                            padding: 10px 20px;
                            background: white;
                            color: #667eea;
                            border: none;
                            border-radius: 8px;
                            cursor: pointer;
                            font-size: 14px;
                            font-weight: 500;
                        ">重新加载</button>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
