<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志配置管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="font-sans">
    <div class="container mx-auto px-4 py-8">
        <!-- 头部 -->
        <div class="glass rounded-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-white mb-2">📊 日志配置管理</h1>
            <p class="text-gray-200">动态调整各个模块的日志输出级别</p>
        </div>

        <!-- 快速操作 -->
        <div class="glass rounded-lg p-4 mb-6">
            <div class="flex flex-wrap gap-3">
                <button onclick="setQuietMode()" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 transition-colors">
                    🤫 静默模式
                </button>
                <button onclick="setVerboseMode()" class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 transition-colors">
                    📢 详细模式
                </button>
                <button onclick="loadConfig()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
                    🔄 刷新配置
                </button>
                <button onclick="resetToDefaults()" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition-colors">
                    🔄 重置默认
                </button>
            </div>
        </div>

        <!-- 状态提示 -->
        <div id="statusMessage" class="hidden mb-4 p-4 rounded-lg"></div>

        <!-- 配置内容 -->
        <div id="configContent" class="space-y-6">
            <!-- 全局配置 -->
            <div class="glass rounded-lg p-6">
                <h2 class="text-xl font-semibold text-white mb-4">🌍 全局配置</h2>
                <div id="globalConfig" class="flex items-center justify-between">
                    <div class="text-gray-200">加载中...</div>
                </div>
            </div>

            <!-- 模块配置 -->
            <div class="glass rounded-lg p-6">
                <h2 class="text-xl font-semibold text-white mb-4">📦 模块配置</h2>
                <div id="moduleConfigs" class="space-y-3">
                    <div class="text-gray-200">加载中...</div>
                </div>
            </div>

            <!-- 说明 -->
            <div class="glass rounded-lg p-6">
                <h2 class="text-xl font-semibold text-white mb-4">📖 日志级别说明</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                    <div class="space-y-2">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-red-500 rounded"></span>
                            <span class="text-gray-200"><strong>ERROR</strong> - 严重错误，需要立即处理</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-yellow-500 rounded"></span>
                            <span class="text-gray-200"><strong>WARN</strong> - 警告信息，可能存在问题</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-blue-500 rounded"></span>
                            <span class="text-gray-200"><strong>LOG</strong> - 一般业务日志</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-gray-500 rounded"></span>
                            <span class="text-gray-200"><strong>DEBUG</strong> - 调试信息，开发时使用</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-3 h-3 bg-purple-500 rounded"></span>
                            <span class="text-gray-200"><strong>VERBOSE</strong> - 详细信息，通常关闭</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/console';
        let currentConfig = null;

        // 显示状态消息
        function showMessage(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `mb-4 p-4 rounded-lg ${
                type === 'error' ? 'bg-red-100 text-red-700 border border-red-200' :
                type === 'success' ? 'bg-green-100 text-green-700 border border-green-200' :
                'bg-blue-100 text-blue-700 border border-blue-200'
            }`;
            statusDiv.textContent = message;
            statusDiv.classList.remove('hidden');

            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 3000);
        }

        // 获取配置
        async function loadConfig() {
            try {
                const response = await fetch(`${API_BASE}/config`);
                if (!response.ok) throw new Error('获取配置失败');

                currentConfig = await response.json();
                renderConfig();
                showMessage('配置加载成功', 'success');
            } catch (error) {
                showMessage('获取配置失败: ' + error.message, 'error');
            }
        }

        // 渲染配置
        function renderConfig() {
            if (!currentConfig) return;

            // 渲染全局配置
            const globalDiv = document.getElementById('globalConfig');
            globalDiv.innerHTML = createLogLevelToggle(currentConfig.global, 'global');

            // 渲染模块配置
            const modulesDiv = document.getElementById('moduleConfigs');
            modulesDiv.innerHTML = Object.entries(currentConfig.modules)
                .map(([moduleName, config]) => `
                    <div class="glass rounded p-4">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-medium text-white">${moduleName}</div>
                                <div class="text-xs text-gray-300 mt-1">
                                    ${getEnabledLevels(config)}
                                </div>
                            </div>
                            ${createLogLevelToggle(config, moduleName)}
                        </div>
                    </div>
                `).join('');
        }

        // 创建日志级别切换器
        function createLogLevelToggle(config, target) {
            const levels = [
                { key: 'enableError', label: 'ERROR', color: 'text-red-600', bgColor: 'bg-red-600' },
                { key: 'enableWarn', label: 'WARN', color: 'text-yellow-600', bgColor: 'bg-yellow-600' },
                { key: 'enableLog', label: 'LOG', color: 'text-blue-600', bgColor: 'bg-blue-600' },
                { key: 'enableDebug', label: 'DEBUG', color: 'text-gray-600', bgColor: 'bg-gray-600' },
                { key: 'enableVerbose', label: 'VERBOSE', color: 'text-purple-600', bgColor: 'bg-purple-600' },
            ];

            return `
                <div class="flex gap-2">
                    ${levels.map(level => `
                        <button
                            onclick="toggleLogLevel('${target}', '${level.key}', ${config[level.key]})"
                            class="px-3 py-1 text-xs rounded border transition-colors ${
                                config[level.key]
                                    ? `${level.color} border-current bg-opacity-20`
                                    : 'text-gray-400 border-gray-300'
                            }"
                        >
                            ${level.label}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        // 获取启用的级别描述
        function getEnabledLevels(config) {
            const levels = [];
            if (config.enableError) levels.push('ERROR');
            if (config.enableWarn) levels.push('WARN');
            if (config.enableLog) levels.push('LOG');
            if (config.enableDebug) levels.push('DEBUG');
            if (config.enableVerbose) levels.push('VERBOSE');
            return levels.length > 0 ? levels.join(' • ') : '全部关闭';
        }

        // 切换日志级别
        async function toggleLogLevel(target, level, currentValue) {
            try {
                const url = target === 'global' ? `${API_BASE}/global` : `${API_BASE}/module/${target}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ [level]: !currentValue })
                });

                if (!response.ok) throw new Error('设置失败');

                await loadConfig();
                showMessage(`${target === 'global' ? '全局' : target} ${level} 设置为 ${!currentValue ? '开启' : '关闭'}`, 'success');
            } catch (error) {
                showMessage('设置失败: ' + error.message, 'error');
            }
        }

        // 设置静默模式
        async function setQuietMode() {
            try {
                const response = await fetch(`${API_BASE}/quiet`, { method: 'POST' });
                if (!response.ok) throw new Error('设置失败');

                await loadConfig();
                showMessage('已设置为静默模式（仅显示ERROR和WARN）', 'success');
            } catch (error) {
                showMessage('设置静默模式失败: ' + error.message, 'error');
            }
        }

        // 设置详细模式
        async function setVerboseMode() {
            try {
                const response = await fetch(`${API_BASE}/verbose`, { method: 'POST' });
                if (!response.ok) throw new Error('设置失败');

                await loadConfig();
                showMessage('已设置为详细模式（显示所有日志）', 'success');
            } catch (error) {
                showMessage('设置详细模式失败: ' + error.message, 'error');
            }
        }

        // 重置为默认配置
        async function resetToDefaults() {
            try {
                const response = await fetch(`${API_BASE}/reset`, { method: 'DELETE' });
                if (!response.ok) throw new Error('重置失败');

                await loadConfig();
                showMessage('已重置为默认配置', 'success');
            } catch (error) {
                showMessage('重置失败: ' + error.message, 'error');
            }
        }

        // 页面加载时获取配置
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
