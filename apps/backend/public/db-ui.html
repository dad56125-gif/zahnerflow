<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ZahnerFlow 后端数据库 UI</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Noto Sans, 'Apple Color Emoji', 'Segoe UI Emoji'; margin: 0; color: #111; background: #f7f7f9; }
      header { background: #111827; color: #fff; padding: 12px 16px; }
      h1 { font-size: 18px; margin: 0; }
      .container { padding: 16px; }
      .tabs { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
      .tab { padding: 6px 10px; border-radius: 6px; background: #e5e7eb; cursor: pointer; border: 1px solid #d1d5db; }
      .tab.active { background: #111827; color: #fff; border-color: #111827; }
      .panel { display: none; }
      .panel.active { display: block; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
      input, select { padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; }
      button { padding: 6px 12px; border-radius: 6px; border: 1px solid #d1d5db; background: #fff; cursor: pointer; }
      button.primary { background: #111827; color: #fff; border-color: #111827; }
      table { border-collapse: collapse; width: 100%; background: #fff; border-radius: 8px; overflow: hidden; }
      th, td { border-bottom: 1px solid #e5e7eb; text-align: left; padding: 8px 10px; font-size: 12px; vertical-align: top; }
      th { background: #f3f4f6; }
      .muted { color: #6b7280; }
      .log { background: #0b1020; color: #d1e7ff; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; padding: 8px; border-radius: 8px; height: 240px; overflow: auto; }
      .badge { display: inline-block; padding: 2px 6px; border-radius: 99px; font-size: 11px; border: 1px solid #d1d5db; background: #fff; }
      .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
      @media (max-width: 1024px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
      @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <h1>ZahnerFlow 后端数据库 UI</h1>
    </header>
    <div class="container">
      <div class="tabs">
        <div class="tab active" data-panel="workflows">Workflows</div>
        <div class="tab" data-panel="data-files">Data Files</div>
        <div class="tab" data-panel="nodes">Nodes</div>
        <div class="tab" data-panel="node-params">Node Params</div>
        <div class="tab" data-panel="events">Events</div>
        <div style="margin-left:auto" class="muted">API: /api/db/*</div>
      </div>

      <section id="panel-workflows" class="panel active">
        <div class="row">
          <input id="wf-owner" placeholder="owner" />
          <input id="wf-individual" placeholder="individual" />
          <input id="wf-title" placeholder="title contains" />
          <input id="wf-keyword" placeholder="keyword (title/description)" />
          <select id="wf-sortBy">
            <option value="updated_at">updated_at</option>
            <option value="created_at">created_at</option>
            <option value="title">title</option>
          </select>
          <select id="wf-order">
            <option value="desc">desc</option>
            <option value="asc">asc</option>
          </select>
          <button class="primary" onclick="loadWorkflows()">查询</button>
        </div>
        <div id="wf-total" class="muted"></div>
        <table>
          <thead><tr><th>id</th><th>owner/individual</th><th>title</th><th>created/updated</th></tr></thead>
          <tbody id="wf-body"></tbody>
        </table>
      </section>

      <section id="panel-data-files" class="panel">
        <div class="row">
          <input id="df-owner" placeholder="owner" />
          <input id="df-individual" placeholder="individual" />
          <input id="df-testType" placeholder="testType" />
          <input id="df-prefix" placeholder="prefix" />
          <input id="df-filename" placeholder="filename contains" />
          <select id="df-sortBy">
            <option value="ts">ts</option>
            <option value="filename">filename</option>
          </select>
          <select id="df-order">
            <option value="desc">desc</option>
            <option value="asc">asc</option>
          </select>
          <button class="primary" onclick="loadDataFiles()">查询</button>
        </div>
        <div id="df-total" class="muted"></div>
        <table>
          <thead><tr><th>owner/individual</th><th>testType</th><th>filename</th><th>prefix-cycle</th><th>ts</th></tr></thead>
          <tbody id="df-body"></tbody>
        </table>
      </section>

      <section id="panel-nodes" class="panel">
        <div class="row">
          <input id="nd-workflowId" placeholder="workflowId"/>
          <input id="nd-nodeType" placeholder="nodeType"/>
          <input id="nd-key" placeholder="nodeKey"/>
          <button class="primary" onclick="loadNodes()">查询</button>
        </div>
        <div id="nd-total" class="muted"></div>
        <table>
          <thead><tr><th>id</th><th>workflowId</th><th>key/type</th><th>display/sort/enabled</th></tr></thead>
          <tbody id="nd-body"></tbody>
        </table>
      </section>

      <section id="panel-node-params" class="panel">
        <div class="row">
          <input id="np-nodeId" placeholder="nodeId"/>
          <input id="np-key" placeholder="key"/>
          <input id="np-valueContains" placeholder="valueContains"/>
          <button class="primary" onclick="loadNodeParams()">查询</button>
        </div>
        <div id="np-total" class="muted"></div>
        <table>
          <thead><tr><th>nodeId</th><th>key</th><th>value_text</th><th>value_num</th><th>value_json</th><th>type/updated</th></tr></thead>
          <tbody id="np-body"></tbody>
        </table>
      </section>

      <section id="panel-events" class="panel">
        <div class="row">
          <button onclick="connectSSE()">连接实时事件</button>
          <button onclick="clearLog()">清空</button>
          <span class="badge" id="evt-status">未连接</span>
        </div>
        <div class="log" id="evt-log"></div>
      </section>
    </div>

    <script>
      const sel = (q) => document.querySelector(q);
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(t => t.addEventListener('click', () => {
        tabs.forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        t.classList.add('active');
        sel('#panel-' + t.dataset.panel).classList.add('active');
      }));

      async function fetchJson(url) {
        const r = await fetch(url);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      }

      async function loadWorkflows() {
        const params = new URLSearchParams();
        const owner = sel('#wf-owner').value.trim();
        const individual = sel('#wf-individual').value.trim();
        const title = sel('#wf-title').value.trim();
        const keyword = sel('#wf-keyword').value.trim();
        const sortBy = sel('#wf-sortBy').value;
        const order = sel('#wf-order').value;
        if (owner) params.set('owner', owner);
        if (individual) params.set('individual', individual);
        if (title) params.set('title', title);
        if (keyword) params.set('keyword', keyword);
        params.set('sortBy', sortBy);
        params.set('order', order);
        params.set('page', '1');
        params.set('limit', '50');
        const data = await fetchJson('/api/db/workflows?' + params.toString());
        sel('#wf-total').textContent = `total: ${data.total}`;
        const tbody = sel('#wf-body');
        tbody.innerHTML = '';
        data.items.forEach(w => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${w.id}</td><td>${w.owner_name||''}/${w.individual_name||''}</td><td>${w.title||''}</td><td>${w.created_at}<br/><span class='muted'>${w.updated_at}</span></td>`;
          tbody.appendChild(tr);
        });
      }

      async function loadDataFiles() {
        const params = new URLSearchParams();
        const owner = sel('#df-owner').value.trim();
        const individual = sel('#df-individual').value.trim();
        const testType = sel('#df-testType').value.trim();
        const prefix = sel('#df-prefix').value.trim();
        const filename = sel('#df-filename').value.trim();
        const sortBy = sel('#df-sortBy').value;
        const order = sel('#df-order').value;
        if (owner) params.set('owner', owner);
        if (individual) params.set('individual', individual);
        if (testType) params.set('testType', testType);
        if (prefix) params.set('prefix', prefix);
        if (filename) params.set('filename', filename);
        params.set('sortBy', sortBy);
        params.set('order', order);
        params.set('page', '1'); params.set('limit', '50');
        const data = await fetchJson('/api/db/data-files?' + params.toString());
        sel('#df-total').textContent = `total: ${data.total}`;
        const tbody = sel('#df-body');
        tbody.innerHTML = '';
        data.items.forEach(f => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${f.owner_name}/${f.individual_name}</td><td>${f.test_type}</td><td>${f.filename}</td><td>${f.prefix||''}-${f.cycle}</td><td>${f.ts}</td>`;
          tbody.appendChild(tr);
        });
      }

      async function loadNodes() {
        const params = new URLSearchParams();
        const wf = sel('#nd-workflowId').value.trim();
        const nt = sel('#nd-nodeType').value.trim();
        const key = sel('#nd-key').value.trim();
        if (wf) params.set('workflowId', wf);
        if (nt) params.set('nodeType', nt);
        if (key) params.set('key', key);
        params.set('page', '1'); params.set('limit', '100');
        const data = await fetchJson('/api/db/nodes?' + params.toString());
        sel('#nd-total').textContent = `total: ${data.total}`;
        const tbody = sel('#nd-body');
        tbody.innerHTML = '';
        data.items.forEach(n => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${n.id}</td><td>${n.workflow_id}</td><td>${n.node_key}<br/><span class='muted'>${n.node_type||''}</span></td><td>${n.display_name||''}<br/><span class='muted'>sort:${n.sort_order} enabled:${n.enabled}</span></td>`;
          tbody.appendChild(tr);
        });
      }

      async function loadNodeParams() {
        const params = new URLSearchParams();
        const nodeId = sel('#np-nodeId').value.trim();
        const key = sel('#np-key').value.trim();
        const valueContains = sel('#np-valueContains').value.trim();
        if (nodeId) params.set('nodeId', nodeId);
        if (key) params.set('key', key);
        if (valueContains) params.set('valueContains', valueContains);
        params.set('page', '1'); params.set('limit', '200');
        const data = await fetchJson('/api/db/node-params?' + params.toString());
        sel('#np-total').textContent = `total: ${data.total}`;
        const tbody = sel('#np-body');
        tbody.innerHTML = '';
        data.items.forEach(p => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${p.node_id}</td><td>${p.key}</td><td>${p.value_text||''}</td><td>${p.value_num??''}</td><td>${p.value_json||''}</td><td>${p.value_type}<br/><span class='muted'>${p.updated_at}</span></td>`;
          tbody.appendChild(tr);
        });
      }

      let sse;
      function connectSSE() {
        if (sse) { try { sse.close(); } catch(e){} }
        const badge = sel('#evt-status');
        badge.textContent = '连接中...'; badge.style.background = '#fff';
        sse = new EventSource('/api/db/events/stream');
        sse.onopen = () => { badge.textContent = '已连接'; badge.style.background = '#d1fae5'; };
        sse.onerror = () => { badge.textContent = '断开'; badge.style.background = '#fee2e2'; };
        sse.onmessage = (ev) => {
          try {
            const data = JSON.parse(ev.data);
            appendLog(`[${data.ts}] ${data.type}\n` + JSON.stringify(data.payload, null, 2));
            // 基于事件自动刷新相关视图（只读、轻量刷新）
            if (data.type === 'workflow_upsert') {
              // 刷新工作流列表
              loadWorkflows().catch(console.error);
              // 如果 Nodes 面板当前已过滤该 workflowId，则刷新 nodes
              const curWf = sel('#nd-workflowId').value.trim();
              if (curWf && curWf === data.payload?.id) {
                loadNodes().catch(console.error);
              }
            } else if (data.type === 'data_file_insert') {
              // 刷新数据文件列表
              loadDataFiles().catch(console.error);
            }
          } catch (_) {
            appendLog(ev.data);
          }
        };
      }
      function appendLog(text) {
        const el = sel('#evt-log');
        const atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 10;
        el.textContent += (el.textContent ? '\n' : '') + text;
        if (atBottom) el.scrollTop = el.scrollHeight;
      }
      function clearLog() { sel('#evt-log').textContent = ''; }

      // 初次加载
      loadWorkflows().catch(console.error);
      loadDataFiles().catch(console.error);
    </script>
  </body>
  </html>
